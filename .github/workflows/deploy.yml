name: Deploy to ydata.co.kr

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ydata
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GEMINI_API_KEY,DART_API_KEY
          script_stop: true
          script: |
            set -ex
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
            cd /home/eugene/workspace/hantu-test
            git fetch origin main
            git reset --hard origin/main
            # --no-audit: vuln 검사 결과로 exit 1 나는 사례 차단 (어제부터 deploy fail 의 유력 원인)
            # --no-fund:  의존성 funding 메시지 출력 줄임
            npm ci --omit=dev --no-audit --no-fund
            touch .env
            upsert_env() {
              local key="$1"
              local val="$2"
              if [ -z "$val" ]; then return; fi
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }
            upsert_env GEMINI_API_KEY "$GEMINI_API_KEY"
            upsert_env DART_API_KEY "$DART_API_KEY"
            # 시드 시총 상한 9천억 (서울반도체 등 8천억대 종목 포함)
            upsert_env PATTERN_MAX_MARKETCAP "900000000000"
            # PM2 강제 재시작 — restart 가 부분 fail 해서 옛 process 가 살아남는 경우 방지.
            # delete 후 start 하면 어떤 상태든 깨끗하게 새 코드 로딩 (1~2초 downtime, 폐쇄형이라 OK).
            pm2 delete hantu-test 2>/dev/null || true
            pm2 start app.js --name hantu-test --update-env
            pm2 save
            # 자동 analyze 임시 비활성화 — 서버 seed 가 5천억 cap 라 일부 종목 (서울반도체 등) 누락.
            # git push 로 들어오는 cache/pattern-result.json 을 그대로 사용하도록 둠.
            # 서버 seed 가 완전해진 후 (시총 9천억까지 reseed) 다시 활성화 가능.
