name: Deploy to ydata.co.kr

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ydata
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GEMINI_API_KEY,DART_API_KEY
          script_stop: true
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
            cd /home/eugene/workspace/hantu-test
            git fetch origin main
            git reset --hard origin/main
            npm ci --omit=dev
            touch .env
            upsert_env() {
              local key="$1"
              local val="$2"
              if [ -z "$val" ]; then return; fi
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }
            upsert_env GEMINI_API_KEY "$GEMINI_API_KEY"
            upsert_env DART_API_KEY "$DART_API_KEY"
            pm2 restart hantu-test --update-env || pm2 start app.js --name hantu-test
            pm2 save
            # 패턴 분석 자동 갱신 — cache/pattern-result.json 새 코드 기준으로 재계산
            # 시드 캐시 (cache/stock-charts/*.json) 가 있을 때만 동작. 실패해도 deploy 는 성공 유지.
            node -e "require('./pattern-screener').analyzeAll({logProgress:false}).then(() => console.log('analyze done')).catch(e => { console.error('analyze failed:', e.message); process.exit(0); })" || true
