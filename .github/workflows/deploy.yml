name: Deploy to ydata.co.kr

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ydata
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"
            cd /home/tracer999/workspace/hantu-test
            git fetch origin main
            git reset --hard origin/main
            pm2 restart hantu-test --update-env || pm2 start app.js --name hantu-test
            pm2 save
